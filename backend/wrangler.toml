name = "smartcms-backend"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
JWT_SECRET = "smartcms-jwt-secret-change-in-production-2026"
CORS_ORIGIN = "http://localhost:5173"

[[d1_databases]]
binding = "DB"
database_name = "smartcms-db"
database_id = "local-dev-db"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "smartcms-files"
